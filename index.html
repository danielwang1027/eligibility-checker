<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PI Eligibility Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: #f1f5f9; min-height: 100vh; padding: 32px 16px; color: #1a1a1a; }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 24px; }
  .form-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .full { grid-column: 1 / -1; }
  .input-wrap { position: relative; }
  input[type=text], input[type=password] { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 13px; outline: none; }
  input:focus { border-color: #2563eb; }
  .toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888; font-size: 13px; }
  .run-btn { width: 100%; padding: 11px 0; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: #2563eb; color: #fff; }
  .run-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .error-box { background: #fff0f0; border: 1px solid #fca5a5; border-radius: 10px; padding: 14px 18px; color: #b91c1c; margin-bottom: 16px; }
  .error-box .hint { font-size: 12px; color: #999; margin-top: 6px; }
  .loading { text-align: center; padding: 48px; color: #666; }
  .report { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; }
  .report h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .meta { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e2e8f0; }
  .meta-item { font-size: 13px; color: #888; }
  .meta-item b { color: #1a1a1a; }
  .overall { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: #1e293b; color: #fff; }
  th { padding: 10px 12px; text-align: left; font-weight: 600; vertical-align: top; }
  td { padding: 9px 12px; vertical-align: top; border-bottom: 1px solid #f1f5f9; }
  tr:last-child td { border-bottom: none; }
  .camp-cell { min-width: 180px; }
  .cname { font-weight: 600; font-size: 12px; }
  .cid { font-size: 10px; color: #888; margin-top: 2px; }
  .detail-line { margin: 2px 0; }
  .cr-block { margin-top: 6px; padding-top: 6px; border-top: 1px dashed #e5e7eb; }
  .tag-ok { color: #15803d; }
  .tag-warn { color: #b45309; }
  .tag-err { color: #b91c1c; }
  /* 新增：屏蔽问题专用样式，比普通错误更醒目 */
  .tag-block {
    display: inline-block;
    color: #7c3aed;
    background: #f5f3ff;
    border: 1px solid #ddd6fe;
    border-radius: 6px;
    padding: 2px 7px;
    margin: 2px 0;
    font-weight: 600;
  }
  .status-icon { text-align: center; font-size: 16px; }
  .th-select { display: block; margin-top: 6px; width: 100%; padding: 4px 6px; border-radius: 6px; border: none; font-size: 11px; background: #374151; color: #fff; cursor: pointer; outline: none; }
  .th-select option { background: #1e293b; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 PI Eligibility Checker</h1>
  <p class="sub">输入参数，自动扫描所有 Active Campaign 的素材合规情况</p>

  <div class="form-card">
    <div class="grid2">
      <div class="full">
        <label>API Key</label>
        <div class="input-wrap">
          <input type="password" id="apiKey" placeholder="输入 Moloco API Key">
          <button class="toggle-btn" onclick="toggleKey()">显示</button>
        </div>
      </div>
      <div>
        <label>Ad Account ID</label>
        <input type="text" id="adAccountId" placeholder="例如：Gv4GCFJMmUFzzzYr">
      </div>
      <div>
        <label>Bundle ID</label>
        <input type="text" id="bundleId" placeholder="例如：com.her.ai.withyou" onkeydown="if(event.key==='Enter')runCheck()">
      </div>
    </div>
    <button class="run-btn" id="runBtn" onclick="runCheck()">🚀 开始检查</button>
  </div>

  <div id="output"></div>
</div>

<script>
const WEBHOOK = "https://moloco.app.n8n.cloud/webhook/eligibility-check";

function toggleKey() {
  const inp = document.getElementById("apiKey");
  inp.type = inp.type === "password" ? "text" : "password";
  inp.nextElementSibling.textContent = inp.type === "password" ? "显示" : "隐藏";
}

async function runCheck() {
  const api_key = document.getElementById("apiKey").value.trim();
  const ad_account_id = document.getElementById("adAccountId").value.trim();
  const bundle_id = document.getElementById("bundleId").value.trim();
  if (!api_key || !ad_account_id || !bundle_id) return alert("请填写所有字段");

  const btn = document.getElementById("runBtn");
  btn.disabled = true; btn.textContent = "⏳ 检查中…";
  document.getElementById("output").innerHTML = `<div class="loading"><div style="font-size:32px;margin-bottom:12px">⏳</div><div>正在拉取数据并校验，请稍候…</div></div>`;

  try {
    const res = await fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ api_key, ad_account_id, bundle_id }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    let data = await res.json();
    if (Array.isArray(data)) data = data[0];
    if (data.json) data = data.json;
    renderReport(data, ad_account_id, bundle_id);
  } catch (e) {
    document.getElementById("output").innerHTML = `
      <div class="error-box">❌ 请求失败：${e.message}
        <div class="hint">请确认 n8n Webhook 节点处于监听状态，且 API Key 正确</div>
      </div>`;
  } finally {
    btn.disabled = false; btn.textContent = "🚀 开始检查";
  }
}

function renderReport(r, adId, bundleId) {
  window._reportData = r;
  window._adId = adId;
  window._bundleId = bundleId;

  const ts = new Date(r.timestamp).toLocaleString("zh-CN");
  const hasIssues = r.has_issues;
  const overallBg = hasIssues ? "#fef3c7" : "#dcfce7";
  const overallColor = hasIssues ? "#b45309" : "#15803d";

  const campOptions = (r.campaign_reports || []).map(c =>
    `<option value="${c.campaign_id}">${c.campaign_name}</option>`).join("");
  const piSet = new Set();
  (r.campaign_reports || []).forEach(c => c.pi_checks.forEach(p => piSet.add(p.pi_name)));
  const piOptions = [...piSet].map(n => `<option value="${n}">${n}</option>`).join("");

  document.getElementById("output").innerHTML = `
    <div class="report">
      <h2>📋 PI Eligibility 检查报告</h2>
      <div class="meta">
        <div class="meta-item"><span>Bundle ID：</span><b>${bundleId}</b></div>
        <div class="meta-item"><span>Ad Account：</span><b>${adId}</b></div>
        <div class="meta-item"><span>检查时间：</span><b>${ts}</b></div>
        <div class="meta-item"><span>Campaign 数：</span><b>${r.total_campaigns_checked}</b></div>
      </div>
      <span class="overall" style="background:${overallBg};color:${overallColor}">
        ${hasIssues ? "⚠️ 存在问题需要处理" : "✅ 所有 Campaign 全部通过"}
      </span>
      <h3 style="font-size:14px;margin-bottom:12px">📁 Campaign 详情</h3>
      <table>
        <thead>
          <tr>
            <th style="width:220px">
              Campaign
              <select id="filterCampaign" class="th-select" onchange="applyFilters()">
                <option value="">全部</option>
                ${campOptions}
              </select>
            </th>
            <th style="width:120px">
              PI
              <select id="filterPI" class="th-select" onchange="applyFilters()">
                <option value="">全部</option>
                ${piOptions}
              </select>
            </th>
            <th style="width:60px;text-align:center">状态</th>
            <th>详情</th>
          </tr>
        </thead>
        <tbody id="reportTbody"></tbody>
      </table>
    </div>`;

  renderTable("", "");
}

function applyFilters() {
  const campFilter = document.getElementById("filterCampaign").value;
  const piFilter = document.getElementById("filterPI").value;
  renderTable(campFilter, piFilter);
}

// 判断是否为屏蔽类错误
function isBlockingError(e) {
  return e.includes("Publisher 未在白名单") ||
         e.includes("Publisher 屏蔽") ||
         e.includes("Exchange 屏蔽") ||
         e.includes("Exchange 未在白名单");
}

function renderTable(campFilter, piFilter) {
  const r = window._reportData;
  let rows = "";

  for (const camp of (r.campaign_reports || [])) {
    if (campFilter && camp.campaign_id !== campFilter) continue;

    const filteredChecks = camp.pi_checks.filter(p => {
      if (piFilter && p.pi_name !== piFilter) return false;
      return true;
    });
    if (filteredChecks.length === 0) continue;

    const campBad = camp.pi_checks.some(p => !p.eligible);
    const campBg = campBad ? "#fff5f5" : "#f0fdf4";
    const campIcon = campBad ? "❌" : "✅";

    filteredChecks.forEach((p, i) => {
      const hasErr = p.errors?.length > 0;
      const hasBlockingErr = (p.errors || []).some(isBlockingError);
      // 屏蔽问题用紫色，普通错误用红色
      const statusIcon = p.eligible ? "✅" : (hasBlockingErr ? "🚫" : (hasErr ? "❌" : "⚠️"));
      const rowBg = p.eligible ? "#f9fff9" : (hasBlockingErr ? "#faf5ff" : (hasErr ? "#fff9f9" : "#fffdf0"));

      let detail = "";

      // 屏蔽错误优先显示在最上方
      const blockingErrors = (p.errors || []).filter(isBlockingError);
      const normalErrors = (p.errors || []).filter(e => !isBlockingError(e));

      blockingErrors.forEach(e => {
        detail += `<div class="detail-line"><span class="tag-block">🚫 流量屏蔽 ${e.replace("❌ ", "")}</span></div>`;
      });
      normalErrors.forEach(e => detail += `<div class="detail-line tag-err">${e}</div>`);
      (p.warnings || []).forEach(w => detail += `<div class="detail-line tag-warn">${w}</div>`);
      (p.passed || []).forEach(s => {
        // 屏蔽检查通过单独标注
        if (s.includes("未检测到") && s.includes("流量屏蔽")) {
          detail += `<div class="detail-line tag-ok" style="color:#2563eb">🔓 ${s.replace("✅ ", "")}</div>`;
        } else {
          detail += `<div class="detail-line tag-ok">${s}</div>`;
        }
      });

      // Creative 级别
      const crBad = (p.creative_errors || []).filter(cr => cr.errors?.length > 0);
      const allCr = p.creative_errors || [];
      if (crBad.length > 0 || allCr.some(cr => cr.passed?.length > 0)) {
        detail += `<div class="cr-block">`;
        const iconBad  = crBad.filter(cr => cr.errors.some(e => e.includes("Icon")));
        const titleBad = crBad.filter(cr => cr.errors.some(e => e.includes("标题")));
        const descBad  = crBad.filter(cr => cr.errors.some(e => e.includes("描述")));
        const ctaBad   = crBad.filter(cr => cr.errors.some(e => e.includes("CTA")));
        if (iconBad.length)  { const m = iconBad[0].errors.find(e => e.includes("Icon")).match(/\d+x\d+ 低于最小要求 \d+x\d+/); detail += `<div class="detail-line tag-err">🖼️ Icon 尺寸不足：${iconBad.length} 个 Creative${m?"（"+m[0]+"）":""}</div>`; }
        if (titleBad.length) { const m = titleBad[0].errors.find(e => e.includes("标题")).match(/\d+ 字符，上限 \d+/); detail += `<div class="detail-line tag-err">📝 标题超长：${titleBad.length} 个 Creative${m?"（"+m[0]+"）":""}</div>`; }
        if (descBad.length)  { const m = descBad[0].errors.find(e => e.includes("描述")).match(/\d+ 字符，上限 \d+/); detail += `<div class="detail-line tag-err">📝 描述超长：${descBad.length} 个 Creative${m?"（"+m[0]+"）":""}</div>`; }
        if (ctaBad.length)   { const m = ctaBad[0].errors.find(e => e.includes("CTA")).match(/\d+ 字符，上限 \d+/); detail += `<div class="detail-line tag-err">📝 CTA 超长：${ctaBad.length} 个 Creative${m?"（"+m[0]+"）":""}</div>`; }
        const iconOk  = allCr.filter(cr => cr.passed?.some(s => s.includes("Icon")));
        const titleOk = allCr.filter(cr => cr.passed?.some(s => s.includes("标题")));
        const descOk  = allCr.filter(cr => cr.passed?.some(s => s.includes("描述")));
        const ctaOk   = allCr.filter(cr => cr.passed?.some(s => s.includes("CTA")));
        if (iconOk.length)  { const s = iconOk[0].passed.find(s => s.includes("Icon")); detail += `<div class="detail-line tag-ok">🖼️ Icon 尺寸通过：${iconOk.length} 个 Creative${s?"（"+s.replace("✅ Icon 尺寸：","")+"）":""}</div>`; }
        if (titleOk.length) { const s = titleOk[0].passed.find(s => s.includes("标题")); detail += `<div class="detail-line tag-ok">📝 标题通过：${titleOk.length} 个 Creative${s?"（"+s.replace("✅ 标题：","")+"）":""}</div>`; }
        if (descOk.length)  { const s = descOk[0].passed.find(s => s.includes("描述")); detail += `<div class="detail-line tag-ok">📝 描述通过：${descOk.length} 个 Creative${s?"（"+s.replace("✅ 描述：","")+"）":""}</div>`; }
        if (ctaOk.length)   { const s = ctaOk[0].passed.find(s => s.includes("CTA")); detail += `<div class="detail-line tag-ok">📝 CTA 通过：${ctaOk.length} 个 Creative${s?"（"+s.replace("✅ CTA：","")+"）":""}</div>`; }
        detail += `</div>`;
      }
      if (!detail) detail = `<span class="tag-ok">通过</span>`;

      const campCell = i === 0
        ? `<td rowspan="${filteredChecks.length}" class="camp-cell" style="background:${campBg};border-right:2px solid #e2e8f0;vertical-align:top">
            <div style="margin-bottom:4px">${campIcon}</div>
            <div class="cname">${camp.campaign_name}</div>
            <div class="cid">${camp.campaign_id}</div>
           </td>` : "";

      rows += `<tr style="background:${rowBg}">${campCell}<td><b>${p.pi_name}</b></td><td class="status-icon">${statusIcon}</td><td>${detail}</td></tr>`;
    });
  }

  if (!rows) rows = `<tr><td colspan="4" style="text-align:center;padding:24px;color:#888">没有符合条件的结果</td></tr>`;
  document.getElementById("reportTbody").innerHTML = rows;
}
</script>
</body>
</html>
